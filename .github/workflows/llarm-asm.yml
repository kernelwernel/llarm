name: llarm-asm

on:
  push:
    paths:
      - 'llarm-asm/**/*.cpp'
      - 'llarm-asm/**/*.hpp'
      - 'llarm-asm/**/CMakeLists.txt'
      - 'llarm-asm/**/*.cmake'
      - 'llarm-asm/**/*.cmake.in'
      - 'cmake/**'
      - 'shared/**'
  pull_request:
    paths:
      - 'llarm-asm/**/*.cpp'
      - 'llarm-asm/**/*.hpp'
      - 'llarm-asm/**/CMakeLists.txt'
      - 'llarm-asm/**/*.cmake'
      - 'llarm-asm/**/*.cmake.in'
      - 'cmake/**'
      - 'shared/**'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake 3.29
        run: |
          wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg > /dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' \
            | sudo tee /etc/apt/sources.list.d/kitware.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y cmake

      - name: Configure
        run: |
          cmake -S llarm-asm -B llarm-asm/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build llarm-asm/build --parallel

      - name: Upload build data
        uses: actions/upload-artifact@v4
        with:
          name: build-data
          path: |
            llarm-asm/build/compile_commands.json
            llarm-asm/build/_deps
