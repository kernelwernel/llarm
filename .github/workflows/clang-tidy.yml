name: clang-tidy

on:
  workflow_run:
    workflows: [llarm-cpu, llarm-emu, llarm-asm]
    types: [completed]

jobs:
  clang-tidy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve subproject
        run: |
          case "${{ github.event.workflow_run.name }}" in
            llarm-cpu) echo "SUBPROJECT=llarm-cpu" >> "$GITHUB_ENV" ;;
            llarm-emu) echo "SUBPROJECT=llarm-emu" >> "$GITHUB_ENV" ;;
            llarm-asm) echo "SUBPROJECT=llarm-asm" >> "$GITHUB_ENV" ;;
          esac

      - name: Download build data
        uses: actions/download-artifact@v4
        with:
          name: build-data
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ env.SUBPROJECT }}/build

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy clang-tools

      - name: Run clang-tidy
        run: |
          run-clang-tidy \
            -p "${{ env.SUBPROJECT }}/build" \
            -extra-arg=-Wno-unknown-warning-option \
            "${{ env.SUBPROJECT }}/src/.*\\.cpp"
