name: llarm-cpu

on:
  push:
    paths:
      - 'llarm-cpu/**/*.cpp'
      - 'llarm-cpu/**/*.hpp'
      - 'llarm-cpu/**/CMakeLists.txt'
      - 'llarm-cpu/**/*.cmake'
      - 'llarm-cpu/**/*.cmake.in'
      - 'llarm-cpu/tests/**'
      - 'cmake/**'
      - 'shared/**'
  pull_request:
    paths:
      - 'llarm-cpu/**/*.cpp'
      - 'llarm-cpu/**/*.hpp'
      - 'llarm-cpu/**/CMakeLists.txt'
      - 'llarm-cpu/**/*.cmake'
      - 'llarm-cpu/**/*.cmake.in'
      - 'llarm-cpu/tests/**'
      - 'cmake/**'
      - 'shared/**'

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake 3.29
        run: |
          wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg > /dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' \
            | sudo tee /etc/apt/sources.list.d/kitware.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y cmake

      - name: Install ARM toolchain and QEMU
        run: |
          sudo apt-get install -y \
            g++-arm-linux-gnueabi \
            qemu-user

      - name: Configure
        run: |
          cmake -S llarm-cpu -B llarm-cpu/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build llarm-cpu/build --parallel

      - name: Test
        run: bash llarm-cpu/tests/run_tests.sh

      - name: Upload build data
        uses: actions/upload-artifact@v4
        with:
          name: build-data
          path: |
            llarm-cpu/build/compile_commands.json
            llarm-cpu/build/_deps
